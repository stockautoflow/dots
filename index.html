<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマートドッツ / Smart Dots</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="home-screen" class="screen active">
        <h1>990010 スマートドッツ / Smart Dots</h1>
        <button id="btn-start-lesson" class="primary-btn">レッスンをはじめる</button>
        <button id="btn-start-endless" class="secondary-btn">🔁 掛け流しモード (Endless)</button>
        
        <div class="settings-panel">
            <h2>設定 / Settings</h2>
            <div class="settings-grid">
                <label>Day (1-90): <input type="number" id="setting-day" min="1" max="90"></label>
                <label>言語: 
                    <select id="setting-lang">
                        <option value="ja">日本語</option>
                        <option value="en">English</option>
                        <option value="bilingual">Bilingual</option>
                    </select>
                </label>
                <label>速度: 
                    <select id="setting-speed">
                        <option value="500">0.5秒</option>
                        <option value="600">0.6秒</option>
                        <option value="800">0.8秒</option>
                    </select>
                </label>
                <label>アイコン: 
                    <select id="setting-skin">
                        <option value="circle">丸 (デフォルト)</option>
                        <option value="🍎">🍎 りんご</option>
                        <option value="⭐">⭐ 星</option>
                        <option value="🐧">🐧 ペンギン</option>
                        <option value="🚗">🚗 くるま</option>
                        <option value="🐶">🐶 いぬ</option>
                        <option value="🍓">🍓 いちご</option>
                        <option value="⚽">⚽ サッカーボール</option>
                        <option value="🚃">🚃 電車</option>
                    </select>
                </label>
                <label>ドッツ色: <input type="color" id="setting-dot-color"></label>
                <label>背景色: <input type="color" id="setting-bg-color"></label>
            </div>
            <div class="backup-section">
                <button id="btn-export">バックアップコード生成</button>
                <input type="text" id="input-import" placeholder="引き継ぎコードを入力">
                <button id="btn-import">復元</button>
            </div>
        </div>
    </div>

    <div id="countdown-screen" class="screen">
        <div id="countdown-text">3</div>
    </div>

    <div id="lesson-screen" class="screen">
        <button id="btn-pause">✕ 中断 (Hold 2s)</button>
        <canvas id="main-canvas"></canvas>
        <div id="lesson-text-overlay"></div>
    </div>

    <div id="lock-screen" class="screen">
        <h2>おうちのひととやってね / For Parents</h2>
        <p id="lock-quiz-text">3 + 4 = ?</p>
        <div id="numpad"></div>
        <button id="btn-lock-cancel">もどる / Cancel</button>
    </div>

    <div id="result-screen" class="screen">
        <h2>よくできました！ / Great Job!</h2>
        <button id="btn-return-home">ホームへ戻る</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
